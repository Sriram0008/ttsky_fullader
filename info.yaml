# Tiny Tapeout project information
project:
  title:        "full_adder"      # Project title
  author:       "sriram"      # Your name
  discord:      ""      # Your discord username (optional)
  description:  "A simple 1-bit full adder with carry-in and carry-out"      # FIXED: Added description
  language:     "Verilog" 
  clock_hz:     0       

  # How many tiles your design occupies?
  tiles: "1x1"          

  # Your top module name must match your verilog module name:
  top_module:  "tt_um_example"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs
  ui[0]: "a"      # Input A
  ui[1]: "b"      # Input B
  ui[2]: "cin"    # Carry In
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "sum"    # Sum Output
  uo[1]: "cout"   # Carry Out
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
